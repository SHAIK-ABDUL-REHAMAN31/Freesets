<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Film strip body -->
  <rect x="6" y="10" width="36" height="28" rx="3" fill="#DC2626"/>
  <!-- Top sprocket holes -->
  <rect x="10" y="12" width="4" height="4" rx="1" fill="#0A0A0A"/>
  <rect x="18" y="12" width="4" height="4" rx="1" fill="#0A0A0A"/>
  <rect x="26" y="12" width="4" height="4" rx="1" fill="#0A0A0A"/>
  <rect x="34" y="12" width="4" height="4" rx="1" fill="#0A0A0A"/>
  <!-- Bottom sprocket holes -->
  <rect x="10" y="32" width="4" height="4" rx="1" fill="#0A0A0A"/>
  <rect x="18" y="32" width="4" height="4" rx="1" fill="#0A0A0A"/>
  <rect x="26" y="32" width="4" height="4" rx="1" fill="#0A0A0A"/>
  <rect x="34" y="32" width="4" height="4" rx="1" fill="#0A0A0A"/>
  <!-- Center frame -->
  <rect x="14" y="18" width="20" height="12" rx="1.5" fill="#fff" opacity="0.25"/>
  <!-- Play triangle -->
  <polygon points="21,20 21,28 29,24" fill="#fff" opacity="0.9"/>
</svg>
